<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="SertainsLabs SpA - Desarrollo web empresarial para todo rubro. Soluciones digitales para empresas, emprendimientos y tiendas online.">
    <meta name="keywords" content="desarrollo web, páginas web empresariales, e-commerce, automatización, SEO">
    <meta name="author" content="SertainsLabs SpA">
    <title>SertainsLabs SpA - Desarrollo web empresarial</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Font Awesome 6 (iconos) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Google Fonts - Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Estilos personalizados -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    
    <style>
        /* Solución: logo sin afectar altura de navbar */
        .navbar {
            background-color: #E8D5B7;
            padding: 8px 0;
            min-height: 60px;
        }
        
        .navbar-brand {
            position: relative;
            top: -20px;
            margin-bottom: -40px;
        }
        
        .navbar-brand img {
            height: 120px;
            width: auto;
            display: block;
        }
        
        /* Ajuste para móviles */
        @media (max-width: 768px) {
            .navbar-brand {
                top: -10px;
                margin-bottom: -30px;
            }
            .navbar-brand img {
                height: 80px;
            }
        }
        
        /* Ajuste para que el contenido no quede debajo del logo */
        body {
            padding-top: 0;
        }
        
        main {
            min-height: calc(100vh - 140px);
        }
    </style>
</head>
<body>

    <!-- Navbar con logo flotante -->
    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container position-relative">
            <a class="navbar-brand" href="/">
                <img src="{{ url_for('static', filename='img/logo2.png') }}" alt="SertainsLabs SpA">
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/" style="color: #111111 !important; font-weight: 600;">Inicio</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/servicios" style="color: #111111 !important; font-weight: 600;">Servicios</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/equipo" style="color: #111111 !important; font-weight: 600;">Equipo</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/contacto" style="color: #111111 !important; font-weight: 600;">Contacto</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Espaciador para que el contenido no quede tapado por el logo flotante -->
    <div style="height: 40px;"></div>

    <!-- Contenido principal -->
    <main>
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer style="background-color: #E8D5B7; color: #111111; padding: 15px 0; margin-top: 40px; border-top: 1px solid rgba(0,0,0,0.05);">
        <div class="container">
            <div class="row align-items-center">
                <div class="col-md-6 text-center text-md-start mb-2 mb-md-0">
                    <p class="mb-0" style="font-size: 0.85rem;">&copy; 2025 SertainsLabs SpA - Todos los derechos reservados</p>
                </div>
                <div class="col-md-6 text-center text-md-end">
                    <p class="mb-0" style="font-size: 0.85rem;">
                        <i class="fas fa-shield-alt"></i> Seguridad y confianza para tu negocio digital
                    </p>
                </div>
            </div>
        </div>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Script para animaciones al hacer scroll -->
    <script>
        const revealElements = document.querySelectorAll('.reveal');
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('active');
                }
            });
        }, { threshold: 0.1 });
        revealElements.forEach(el => observer.observe(el));
        
        document.addEventListener('DOMContentLoaded', function() {
            const animatedElements = document.querySelectorAll('.fade-in-up, .fade-in-left, .fade-in-right, .scale-in');
            animatedElements.forEach((el, index) => {
                if (!el.classList.contains('active')) {
                    el.style.opacity = '1';
                }
            });
        });
    </script>
</body>
</html>
